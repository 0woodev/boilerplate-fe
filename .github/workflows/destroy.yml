name: Terraform Destroy

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: '삭제 확인 (yes 입력)'
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  destroy:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'prod' || github.ref_name }}
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      PROJECT_NAME: ${{ vars.PROJECT_NAME }}
      STAGE: ${{ github.ref_name == 'main' && 'prod' || github.ref_name }}

    steps:
      - name: Validate confirm input
        run: |
          if [ "${{ inputs.confirm }}" != "yes" ]; then
            echo "❌ 삭제 확인 실패. 'yes' 를 입력하세요."
            exit 1
          fi

      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/${{ env.PROJECT_NAME }}-${{ env.STAGE }}-fe-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ env.PROJECT_NAME }}/${{ env.STAGE }}/fe/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ vars.PROJECT_NAME }}-tf-lock"

      - name: Empty S3 bucket (비어있어야 삭제 가능)
        working-directory: terraform
        run: |
          BUCKET=$(terraform output -raw s3_bucket_name 2>/dev/null || echo "")
          if [ -z "$BUCKET" ]; then
            echo "S3 버킷 output 없음, 건너뜀"
            exit 0
          fi
          echo "버킷 비우는 중: $BUCKET"
          aws s3 rm s3://$BUCKET/ --recursive || true
          python3 -c "
          import subprocess, json
          bucket = '$BUCKET'
          for list_type in ['Versions', 'DeleteMarkers']:
              result = subprocess.run(
                  ['aws', 's3api', 'list-object-versions', '--bucket', bucket, '--output', 'json'],
                  capture_output=True, text=True
              )
              if result.returncode != 0:
                  continue
              data = json.loads(result.stdout or '{}')
              objects = [{'Key': o['Key'], 'VersionId': o['VersionId']} for o in data.get(list_type, [])]
              if objects:
                  subprocess.run([
                      'aws', 's3api', 'delete-objects',
                      '--bucket', bucket,
                      '--delete', json.dumps({'Objects': objects, 'Quiet': True})
                  ], check=True)
          print('버킷 비우기 완료')
          "

      - name: Terraform Destroy
        working-directory: terraform
        run: |
          terraform destroy -auto-approve \
            -var="project_name=${{ env.PROJECT_NAME }}" \
            -var="stage=${{ env.STAGE }}" \
            -var="aws_region=${{ env.AWS_REGION }}" \
            -var="domain=${{ vars.DOMAIN }}" \
            -var="fe_subdomain=${{ vars.FE_SUBDOMAIN }}"
