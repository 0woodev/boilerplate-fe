name: Terraform Global (One-time Setup)

# FE IAM Role (OIDC용) 최초 1회 실행
# 이후 deploy workflow가 OIDC 인증으로 동작
on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}

jobs:
  apply-global:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # global은 OIDC 생성 전이므로 정적 Access Key 사용
      - name: Configure AWS credentials (Access Key)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init (global)
        working-directory: terraform/global
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ vars.PROJECT_NAME }}/fe-global.tfstate" \
            -backend-config="region=${{ vars.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ vars.PROJECT_NAME }}-tf-lock"

      - name: Terraform Apply (global)
        working-directory: terraform/global
        run: |
          terraform apply -auto-approve \
            -var="aws_region=${{ vars.AWS_REGION }}" \
            -var="project_name=${{ vars.PROJECT_NAME }}" \
            -var="github_owner=${{ vars.GH_OWNER }}" \
            -var="aws_account_id=${{ vars.AWS_ACCOUNT_ID }}" \
            -var="tf_state_bucket=${{ vars.TF_STATE_BUCKET }}"
